<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Produtos Cadastrados</h1>
    <a href="index.html">Voltar</a> | <a href="cadastro.html">Novo Cadastro</a>
    <hr>
    
    <ul id="listaProdutos"></ul>

    <script>
        async function carregarProdutos() {
            const response = await fetch('http://localhost:3000/produtos');
            const produtos = await response.json();
            
            const lista = document.getElementById('listaProdutos');
            lista.innerHTML = '';

            produtos.forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${p.nome} - R$ ${parseFloat(p.preco).toFixed(2)}</span>
                    <a href="editar.html?id=${p.id}"><button>Editar</button></a>
                    <button class="delete-btn" onclick="deletarProduto(${p.id})">Apagar</button>
                `;
                lista.appendChild(li);
            });
        }

        async function deletarProduto(id) {
            if (!confirm('Tem certeza que deseja apagar este produto?')) return;
            const response = await fetch(`http://localhost:3000/produtos/${id}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                alert('Produto apagado com sucesso!');
                carregarProdutos();
            } else {
                alert('Erro ao apagar produto.');
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
